services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://gts:gts_password@postgres:5432/gts
      SESSION_SECRET_KEY: compose-local-session-secret
      ENABLE_LEGACY_ACCESS_CODE: "false"
      FORCE_HTTPS: "false"
      SECURE_COOKIES: "false"
      UPLOAD_DIR: /data/uploads
      GENERATED_DIR: /data/generated
      BACKUP_DIR: /data/backups
    volumes:
      - ./docker-data/uploads:/data/uploads
      - ./docker-data/generated:/data/generated
      - ./docker-data/backups:/data/backups
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gts
      POSTGRES_USER: gts
      POSTGRES_PASSWORD: gts_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gts -d gts"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
