{% extends "base.html" %}

{% block title %}修改密码 - GTS Internal Tool{% endblock %}
{% block page_name %}修改密码{% endblock %}

{% block content %}
  <section class="narrow-panel">
    <h1>修改密码</h1>
    <p>当前账号需要先修改密码，完成后才能继续使用系统。</p>
    <form method="post" action="/change-password" class="form-stack" autocomplete="off">
      <label for="current_password">当前密码</label>
      <input id="current_password" name="current_password" type="password" autocomplete="current-password" required autofocus>

      <label for="new_password">新密码</label>
      <input id="new_password" name="new_password" type="password" autocomplete="new-password" required>

      <label for="confirm_new_password">确认新密码</label>
      <input id="confirm_new_password" name="confirm_new_password" type="password" autocomplete="new-password" required>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <button type="submit">保存新密码</button>
    </form>
  </section>
{% endblock %}
