{% extends "base.html" %}

{% block title %}报关资料上传结果 - GTS Internal Tool{% endblock %}
{% block page_name %}报关资料上传结果{% endblock %}

{% block content %}
  <section class="page-heading">
    <h1>报关资料上传结果</h1>
    <p>文件：{{ file_name }}</p>
  </section>
  <section class="summary-grid">
    <div>
      <strong>{{ result.updated }}</strong>
      <span>已更新</span>
    </div>
    <div>
      <strong>{{ result.failed }}</strong>
      <span>失败</span>
    </div>
  </section>
{% endblock %}
