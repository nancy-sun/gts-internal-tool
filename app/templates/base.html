<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}GTS Internal Tool{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}?v=20260510-preview-cn">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">GTS Internal Tool</a>
      {% if request.session.get("authenticated") %}
        <form method="post" action="/logout">
          <button class="secondary-button" type="submit">退出</button>
        </form>
      {% endif %}
    </header>
    <main class="page">
      {% if request.session.get("authenticated") and request.url.path != "/" %}
        <nav class="breadcrumb-bar" aria-label="当前位置">
          <a class="return-link" href="/" aria-label="返回首页">
            <span class="return-icon" aria-hidden="true">↩</span>
            <span>返回</span>
          </a>
          <ol class="breadcrumb-list">
            <li><a href="/">首页</a></li>
            <li aria-current="page">{% block page_name %}当前页面{% endblock %}</li>
          </ol>
        </nav>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', path='/app.js') }}?v=20260510-preview-cn"></script>
  </body>
</html>
