<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}GTS Internal Tool{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">GTS Internal Tool</a>
      {% if request.session.get("authenticated") %}
        <form method="post" action="/logout">
          <button class="secondary-button" type="submit">Log out</button>
        </form>
      {% endif %}
    </header>
    <main class="page">
      {% if request.session.get("authenticated") and request.url.path != "/" %}
        <nav class="breadcrumb-bar" aria-label="Breadcrumb">
          <ol class="breadcrumb-list">
            <li><a href="/">Dashboard</a></li>
            <li aria-current="page">{% block page_name %}Current Page{% endblock %}</li>
          </ol>
          <a class="return-link" href="/" aria-label="Return to dashboard">
            <span class="return-icon" aria-hidden="true">↩</span>
            <span>Return</span>
          </a>
        </nav>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', path='/app.js') }}"></script>
  </body>
</html>
