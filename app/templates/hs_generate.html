{% extends "base.html" %}

{% block title %}生成 HS Code 报表 - GTS Internal Tool{% endblock %}
{% block page_name %}生成 HS Code 报表{% endblock %}

{% block content %}
  <section class="page-heading">
    <h1>生成 HS Code 报表</h1>
  </section>
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
  <form class="form-stack" method="post" action="/hs-codes/generate/preview" enctype="multipart/form-data">
    <label>
      操作员姓名
      <input name="operator_name" required autocomplete="name">
    </label>
    <label>
      Excel 文件
      <input name="excel_file" type="file" accept=".xlsx" required>
    </label>
    <button type="submit">生成</button>
  </form>
{% endblock %}
