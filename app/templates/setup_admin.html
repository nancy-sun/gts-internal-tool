{% extends "base.html" %}

{% block title %}创建管理员 - GTS Internal Tool{% endblock %}
{% block page_name %}创建管理员{% endblock %}

{% block content %}
  <section class="narrow-panel">
    <h1>创建第一个管理员</h1>
    <p>系统还没有员工账号。请先创建一个管理员账号。</p>
    <form method="post" action="/setup-admin" class="form-stack">
      <label for="username">用户名</label>
      <input id="username" name="username" autocomplete="username" value="{{ values.username or '' }}" required autofocus>

      <label for="display_name">显示名称</label>
      <input id="display_name" name="display_name" autocomplete="name" value="{{ values.display_name or '' }}" required>

      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="new-password" required>

      <label for="confirm_password">确认密码</label>
      <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <button type="submit">创建管理员</button>
    </form>
  </section>
{% endblock %}
