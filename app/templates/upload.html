{% extends "base.html" %}

{% block title %}上传完整报价单 - GTS Internal Tool{% endblock %}
{% block page_name %}上传完整报价单{% endblock %}

{% block content %}
  <section class="page-heading">
    <h1>上传完整报价单</h1>
  </section>

  <section class="narrow-panel">
    <form method="post" action="/upload/preview" enctype="multipart/form-data" class="form-stack">
      <label for="operator_name">操作员姓名</label>
      <input id="operator_name" name="operator_name" required autocomplete="name">

      <label for="excel_file">Excel 文件</label>
      <input id="excel_file" name="excel_file" type="file" accept=".xlsx" required>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <button type="submit">解析文件</button>
    </form>
  </section>
{% endblock %}
