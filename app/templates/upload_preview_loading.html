{% extends "base.html" %}

{% block title %}导入预览 - GTS Internal Tool{% endblock %}
{% block page_name %}导入预览{% endblock %}

{% block content %}
  <section class="page-heading">
    <h1>导入预览</h1>
    <p>文件：{{ file_name }}　操作员：{{ operator_name }}</p>
  </section>

  <form class="preview-page-form" method="post" action="/upload/confirm" data-upload-preview-form>
    <input type="hidden" name="token" value="{{ token }}">
    <div
      class="table-wrap upload-preview-wrap"
      data-upload-preview-stream="{{ url_for('upload_preview_stream', token=token) }}"
    >
      <table class="upload-preview-table">
        <thead>
          <tr data-upload-preview-header>
            <th>行</th>
            <th>状态</th>
            <th>GTS</th>
            <th>OEM</th>
            <th>品名</th>
            <th>工厂</th>
            <th>单位</th>
            <th>价格</th>
            <th>交期</th>
          </tr>
        </thead>
        <tbody data-upload-preview-body>
          <tr>
            <td colspan="9">
              <span class="loading-icon" aria-hidden="true"></span>
              正在生成预览...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="form-actions">
      <span class="preview-progress" data-upload-preview-progress>正在读取行...</span>
      <a class="text-link" href="/upload">取消</a>
      <button type="submit" data-upload-preview-confirm disabled>
        <span class="button-loading-icon" data-upload-preview-confirm-spinner aria-hidden="true"></span>
        <span>确认导入</span>
      </button>
    </div>
  </form>
{% endblock %}
